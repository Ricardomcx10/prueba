<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MIWEBPRO · DASHBOARD</title>
  <!-- Google Fonts: Inter y JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (kit opcional, usamos la gratuita) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== RESET Y VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fondo: #03030a;
      --superficie: rgba(12, 12, 22, 0.5);
      --borde-cristal: rgba(255, 255, 255, 0.05);
      --brillo-dorado: #ffd966;
      --rosa-profundo: #ff70a6;
      --cian-elegante: #70d6ff;
      --violeta-sutil: #b583df;
      --sombra-fuerte: 0 30px 50px -20px rgba(0, 0, 0, 0.8);
      --transicion-larga: 0.5s cubic-bezier(0.2, 1.2, 0.3, 1);
      --radio-tarjeta: 40px;
    }

    body {
      background: var(--fondo);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      font-weight: 300;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }

    /* ===== FONDO DINÁMICO CON PARTÍCULAS ===== */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .fondo-nebulosa {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 15% 20%, rgba(255, 112, 166, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, rgba(112, 214, 255, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 40% 60%, rgba(181, 131, 223, 0.1) 0%, transparent 50%),
        #03030a;
      filter: blur(90px) brightness(1.2);
      animation: respirar 18s infinite alternate;
      z-index: -1;
    }

    @keyframes respirar {
      0% { transform: scale(1); filter: blur(90px) brightness(1.2); }
      100% { transform: scale(1.25); filter: blur(100px) brightness(1.5); }
    }

    /* ===== HEADER ===== */
    .cabecera {
      position: relative;
      z-index: 20;
      max-width: 1600px;
      margin: 2rem auto 1.5rem;
      padding: 1rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(8, 8, 16, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 120px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(145deg, #ffd966, #ff70a6, #70d6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 15px rgba(255, 217, 102, 0.3));
    }

    .menu-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .menu-btn:hover {
      border-color: #ffd966;
      background: rgba(255, 217, 102, 0.1);
      transform: rotate(180deg) scale(1.1);
      color: #ffd966;
    }

    /* ===== DRAWER ===== */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
    }
    .drawer-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .drawer {
      position: fixed;
      top: 0;
      right: -450px;
      width: 380px;
      max-width: 85vw;
      height: 100vh;
      background: rgba(8, 8, 16, 0.9);
      backdrop-filter: blur(60px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 3rem 2.5rem;
      transition: right 0.6s var(--transicion-larga);
      z-index: 200;
      display: flex;
      flex-direction: column;
      box-shadow: -30px 0 60px rgba(0, 0, 0, 0.8);
    }
    .drawer.active {
      right: 0;
    }
    .drawer-cerrar {
      align-self: flex-end;
      background: none;
      border: none;
      color: #fff;
      font-size: 2.2rem;
      cursor: pointer;
      margin-bottom: 2.5rem;
      opacity: 0.6;
      transition: 0.3s;
    }
    .drawer-cerrar:hover {
      opacity: 1;
      color: #ffd966;
      transform: rotate(90deg);
    }
    .drawer-item {
      padding: 1.2rem 1.8rem;
      border-radius: 60px;
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 1rem;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid transparent;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      color: rgba(255, 255, 255, 0.9);
    }
    .drawer-item i {
      width: 2rem;
      font-size: 1.4rem;
      color: #ffd966;
    }
    .drawer-item:hover {
      border-color: #ffd966;
      background: rgba(255, 217, 102, 0.1);
      transform: translateX(-8px);
    }

    /* ===== BENTO GRID ===== */
    .bento-grid {
      position: relative;
      z-index: 20;
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
    }

    /* ===== TARJETAS DE LUJO ===== */
    .tarjeta {
      background: rgba(15, 15, 28, 0.25);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: var(--radio-tarjeta);
      padding: 2rem 1.8rem;
      box-shadow: var(--sombra-fuerte), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: 0.4s ease;
      animation: aparecer 0.8s cubic-bezier(0.2, 1.2, 0.3, 1) both;
      position: relative;
      overflow: hidden;
    }

    .tarjeta::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, transparent 30%, rgba(255, 217, 102, 0.1), rgba(112, 214, 255, 0.1), transparent 70%);
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.6s;
    }

    .tarjeta:hover::before {
      opacity: 1;
    }

    .tarjeta:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(255, 217, 102, 0.3);
      box-shadow: 0 40px 80px -20px #ffd966, inset 0 0 80px rgba(255, 217, 102, 0.1);
    }

    @keyframes aparecer {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tarjeta:nth-child(1) { animation-delay: 0.05s; }
    .tarjeta:nth-child(2) { animation-delay: 0.10s; }
    .tarjeta:nth-child(3) { animation-delay: 0.15s; }
    .tarjeta:nth-child(4) { animation-delay: 0.20s; }
    .tarjeta:nth-child(5) { animation-delay: 0.25s; }

    .tarjeta h3 {
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.8rem;
    }

    .tarjeta h3 i {
      color: #ffd966;
      font-size: 1.8rem;
    }

    /* ===== INPUTS Y BOTONES ===== */
    input, select, textarea {
      width: 100%;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 60px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
      font-family: inherit;
      backdrop-filter: blur(10px);
    }

    input:focus, select:focus, textarea:focus {
      border-color: #ffd966;
      box-shadow: 0 0 0 4px rgba(255, 217, 102, 0.2);
      background: rgba(0, 0, 0, 0.6);
    }

    button {
      padding: 0.9rem 1.8rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 60px;
      color: white;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(10px);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    button i {
      font-size: 1rem;
      transition: transform 0.2s;
    }

    button:hover {
      background: rgba(255, 217, 102, 0.15);
      border-color: #ffd966;
      transform: scale(0.98);
    }

    button:hover i {
      transform: rotate(360deg);
    }

    /* ===== BARRA FINANCIERA ===== */
    .estadisticas-finanza {
      display: flex;
      justify-content: space-between;
      margin: 1.2rem 0 1rem;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .estadistica-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.6rem 1rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: 0.3s;
    }

    .estadistica-item:hover {
      border-color: #ffd966;
      background: rgba(255, 217, 102, 0.05);
    }

    .estadistica-item i {
      font-size: 1.3rem;
      color: #ffd966;
    }

    .contenedor-barra {
      width: 100%;
      height: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      margin: 1.5rem 0;
      display: flex;
      gap: 3px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    .segmento-barra {
      height: 100%;
      transition: width 0.8s cubic-bezier(0.2, 1.2, 0.3, 1);
      background: linear-gradient(90deg, #ffd966, #ff70a6, #70d6ff);
      border-radius: 20px;
      position: relative;
      box-shadow: 0 0 10px rgba(255, 217, 102, 0.3);
    }

    /* Tooltips personalizados */
    [data-tooltip] {
      position: relative;
      cursor: help;
    }

    [data-tooltip]:before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 150%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1rem;
      border-radius: 30px;
      white-space: nowrap;
      font-size: 0.8rem;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 30;
      font-family: 'JetBrains Mono', monospace;
    }

    [data-tooltip]:hover:before {
      opacity: 1;
    }

    /* Lista de gastos con eliminación */
    .lista-gastos {
      max-height: 160px;
      overflow-y: auto;
      margin-top: 1rem;
      padding-right: 4px;
    }

    .gasto-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 40px;
      padding: 0.6rem 1.2rem;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: 0.2s;
    }

    .gasto-item:hover {
      border-color: #ffd966;
      background: rgba(255, 217, 102, 0.05);
    }

    .gasto-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .gasto-categoria {
      font-size: 0.7rem;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      background: rgba(255, 217, 102, 0.2);
      color: #ffd966;
    }

    .gasto-monto {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }

    .btn-eliminar-gasto {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      padding: 0.3rem;
      font-size: 1rem;
    }

    .btn-eliminar-gasto:hover {
      color: #ff70a6;
      background: none;
      transform: scale(1.2);
    }

    /* ===== TAREAS ===== */
    .lista-tareas {
      max-height: 280px;
      overflow-y: auto;
    }

    .item-tarea {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 60px;
      padding: 0.8rem 1.4rem;
      margin-bottom: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
      cursor: grab;
    }

    .item-tarea i.fa-grip-vertical {
      color: rgba(255, 255, 255, 0.2);
    }

    .item-tarea span {
      flex: 1;
    }

    .etiqueta-prioridad {
      font-size: 0.7rem;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      background: rgba(255, 217, 102, 0.2);
    }

    .item-tarea button {
      padding: 0.3rem 1rem;
    }

    /* ===== ENLACES ===== */
    .contenedor-enlaces {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      padding: 0.5rem 0;
    }

    .pill-enlace {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      white-space: nowrap;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .pill-enlace i {
      color: #ffd966;
    }

    .pill-enlace:hover {
      border-color: #ffd966;
      background: rgba(255, 217, 102, 0.1);
    }

    /* ===== UTILIDADES ===== */
    .oculto {
      display: none;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* ===== MEDIA QUERIES PARA MÓVIL ===== */
    @media (max-width: 600px) {
      .cabecera {
        margin: 1rem 0.5rem;
        padding: 0.6rem 1.2rem;
      }
      .logo {
        font-size: 1.4rem;
        letter-spacing: 0.1em;
      }
      .menu-btn {
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
      }
      .bento-grid {
        padding: 0 0.5rem 1rem;
        gap: 1rem;
        grid-template-columns: 1fr; /* Forzar 1 columna en móvil */
      }
      .tarjeta {
        padding: 1.5rem 1.2rem;
      }
      .tarjeta h3 {
        font-size: 1.4rem;
        margin-bottom: 1.2rem;
      }
      .tarjeta h3 i {
        font-size: 1.5rem;
      }
      input, select, textarea {
        padding: 0.8rem 1.2rem;
        font-size: 0.9rem;
      }
      button {
        padding: 0.7rem 1.2rem;
        font-size: 0.9rem;
      }
      .estadisticas-finanza {
        flex-direction: column;
        gap: 0.5rem;
      }
      .estadistica-item {
        flex-direction: row;
        width: 100%;
        justify-content: space-between;
        padding: 0.5rem 1rem;
      }
      .estadistica-item i {
        font-size: 1.1rem;
      }
      .contenedor-barra {
        height: 10px;
        margin: 1rem 0;
      }
      .gasto-item {
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .gasto-info {
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .item-tarea {
        flex-wrap: wrap;
        padding: 0.6rem 1rem;
      }
      .item-tarea button {
        padding: 0.2rem 0.8rem;
      }
      .drawer {
        padding: 2rem 1.5rem;
      }
      .drawer-item {
        padding: 1rem 1.2rem;
        font-size: 1.1rem;
      }
    }

    /* Ajustes para pantallas muy pequeñas (menos de 400px) */
    @media (max-width: 400px) {
      .cabecera {
        padding: 0.5rem 1rem;
      }
      .logo {
        font-size: 1.2rem;
      }
      .menu-btn {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }
      .tarjeta {
        padding: 1.2rem 1rem;
      }
      input, select, textarea {
        padding: 0.7rem 1rem;
      }
      .gasto-info {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="fondo-nebulosa"></div>

  <!-- CABECERA -->
  <header class="cabecera">
    <div class="logo">ONYX AURORA</div>
    <div class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></div>
  </header>

  <!-- DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <button class="drawer-cerrar" id="closeDrawer"><i class="fas fa-times"></i></button>
    <div class="drawer-item" id="changeRole"><i class="fas fa-sync-alt"></i> Cambiar rol</div>
    <div class="drawer-item" id="resetData"><i class="fas fa-trash-alt"></i> Reiniciar datos</div>
  </div>

  <!-- BENTO GRID -->
  <div class="bento-grid" id="bentoGrid"></div>

  <script>
    (function() {
      // ===== REDIRECCIONES =====
      if (!localStorage.getItem('oa_currentUser')) {
        window.location.href = 'index.html';
        return;
      }
      if (!localStorage.getItem('oa_isStudent')) {
        window.location.href = 'pregunta.html';
        return;
      }

      // ===== CONSTANTES Y ESTADO =====
      const STORAGE_KEYS = {
        isStudent: 'oa_isStudent',
        classes: 'oa_classes',
        finance: 'oa_finance',
        transactions: 'oa_transactions',
        diary: 'oa_diary',
        tasks: 'oa_tasks',
        links: 'oa_links',
        snoozed: 'oa_snoozed'
      };

      let isStudent = localStorage.getItem(STORAGE_KEYS.isStudent) === '1';
      let classes = JSON.parse(localStorage.getItem(STORAGE_KEYS.classes)) || [];
      let finance = JSON.parse(localStorage.getItem(STORAGE_KEYS.finance)) || { income: 5000, rate: 45 };
      let transactions = JSON.parse(localStorage.getItem(STORAGE_KEYS.transactions)) || [];
      let diary = JSON.parse(localStorage.getItem(STORAGE_KEYS.diary)) || [];
      let tasks = JSON.parse(localStorage.getItem(STORAGE_KEYS.tasks)) || [];
      let links = JSON.parse(localStorage.getItem(STORAGE_KEYS.links)) || [];
      let snoozed = JSON.parse(localStorage.getItem(STORAGE_KEYS.snoozed)) || {};

      // Normalizar clases
      classes = classes.map(c => ({
        id: c.id || Date.now() + Math.random(),
        nombre: c.nombre || c.name || 'Clase',
        hora: c.hora || c.time || '08:00'
      }));

      // ===== PARTÍCULAS ELEGANTES =====
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let width, height, particles = [];

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function initParticles() {
        particles = [];
        for (let i = 0; i < 60; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 2.5 + 0.5,
            vx: (Math.random() - 0.5) * 0.1,
            vy: (Math.random() - 0.5) * 0.1,
            color: `rgba(${Math.random() > 0.5 ? '255,217,102' : '112,214,255'},${Math.random() * 0.2 + 0.1})`
          });
        }
      }
      initParticles();

      function drawParticles() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;
        });
        requestAnimationFrame(drawParticles);
      }
      drawParticles();

      // ===== UTILIDADES =====
      function save(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      // ===== DRAWER =====
      const menuBtn = document.getElementById('menuBtn');
      const drawerOverlay = document.getElementById('drawerOverlay');
      const drawer = document.getElementById('drawer');
      const closeDrawer = document.getElementById('closeDrawer');
      const changeRole = document.getElementById('changeRole');
      const resetData = document.getElementById('resetData');

      menuBtn.addEventListener('click', () => {
        drawerOverlay.classList.add('active');
        drawer.classList.add('active');
      });
      closeDrawer.addEventListener('click', () => {
        drawerOverlay.classList.remove('active');
        drawer.classList.remove('active');
      });
      drawerOverlay.addEventListener('click', () => {
        drawerOverlay.classList.remove('active');
        drawer.classList.remove('active');
      });

      changeRole.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEYS.isStudent);
        window.location.href = 'pregunta.html';
      });

      resetData.addEventListener('click', () => {
        if (confirm('¿Reiniciar todos los datos?')) {
          const currentUser = localStorage.getItem('oa_currentUser');
          localStorage.clear();
          localStorage.setItem('oa_currentUser', currentUser);
          window.location.reload();
        }
      });

      // ===== RENDERIZADO =====
      const bentoGrid = document.getElementById('bentoGrid');

      function render() {
        let html = '';
        if (isStudent) html += renderHorario();
        html += renderFinanzas();
        html += renderDiario();
        html += renderTareas();
        html += renderEnlaces();
        bentoGrid.innerHTML = html;
      }

      // --- Horario ---
      function renderHorario() {
        const ahora = new Date();
        const horaActual = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;

        const proximas = classes.filter(c => {
          if (snoozed[c.id] && snoozed[c.id] > Date.now()) return false;
          const diff = diffMinutos(c.hora, horaActual);
          return diff >= 0 && diff <= 15;
        });

        const alertas = proximas.map(c => `
          <div style="background: rgba(255,112,166,0.1); border:1px solid #ff70a6; border-radius:40px; padding:1rem; margin-bottom:0.8rem; display:flex; justify-content:space-between; align-items:center;">
            <span><i class="fas fa-exclamation-circle" style="color:#ff70a6;"></i> <strong>${c.nombre}</strong> a las ${c.hora}</span>
            <button class="btn-snooze" data-id="${c.id}" style="background:transparent; border-color:#ff70a6;"><i class="fas fa-clock"></i> Posponer</button>
          </div>
        `).join('');

        const lista = classes.sort((a,b)=>a.hora.localeCompare(b.hora)).map(c => `
          <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); border-radius:40px; padding:0.7rem 1.2rem; margin-bottom:0.5rem;">
            <span><i class="fas fa-book-open" style="color:#70d6ff; margin-right:0.8rem;"></i> <strong>${c.nombre}</strong> <span class="mono">${c.hora}</span></span>
            <button class="btn-delete-class" data-id="${c.id}" style="padding:0.3rem 1rem;"><i class="fas fa-trash"></i></button>
          </div>
        `).join('');

        return `
          <div class="tarjeta" id="modulo-horario">
            <h3><i class="fas fa-calendar-alt"></i> Horario de clases</h3>
            <div id="alertas-horario">${alertas}</div>
            <div style="margin:1.5rem 0;">${lista}</div>
            <div style="display:flex; gap:0.5rem;">
              <input type="text" id="newClassName" placeholder="Materia" style="flex:2;">
              <input type="time" id="newClassTime" value="08:00" style="flex:1;">
              <button id="addClassBtn"><i class="fas fa-plus"></i></button>
            </div>
          </div>
        `;
      }

      function diffMinutos(h1, h2) {
        const [a,b] = h1.split(':').map(Number);
        const [c,d] = h2.split(':').map(Number);
        return (a*60+b) - (c*60+d);
      }

      // --- Finanzas (con eliminación de gastos) ---
      function renderFinanzas() {
        const income = finance.income || 5000;
        const rate = finance.rate || 45;
        const gastosNec = transactions.filter(t => t.cat === 'necesidad').reduce((s,t)=> s + t.monto,0);
        const gastosDes = transactions.filter(t => t.cat === 'deseo').reduce((s,t)=> s + t.monto,0);
        const gastosAho = transactions.filter(t => t.cat === 'ahorro').reduce((s,t)=> s + t.monto,0);

        const maxNec = income * 0.5;
        const maxDes = income * 0.3;
        const maxAho = income * 0.2;

        const pctNec = maxNec > 0 ? Math.min(100, (gastosNec / maxNec) * 100) : 0;
        const pctDes = maxDes > 0 ? Math.min(100, (gastosDes / maxDes) * 100) : 0;
        const pctAho = maxAho > 0 ? Math.min(100, (gastosAho / maxAho) * 100) : 0;

        const listaGastos = transactions.map((t, idx) => `
          <div class="gasto-item" data-index="${idx}">
            <div class="gasto-info">
              <span class="gasto-categoria" style="background:${t.cat==='necesidad'?'rgba(255,112,166,0.2)':t.cat==='deseo'?'rgba(112,214,255,0.2)':'rgba(255,217,102,0.2)'};">${t.cat}</span>
              <span>${t.desc}</span>
            </div>
            <span class="gasto-monto">$${t.monto}</span>
            <button class="btn-eliminar-gasto" data-index="${idx}"><i class="fas fa-times"></i></button>
          </div>
        `).join('');

        return `
          <div class="tarjeta" id="modulo-finanzas">
            <h3><i class="fas fa-chart-pie"></i> Finanzas</h3>
            <div style="display:flex; gap:0.5rem;">
              <input type="number" id="incomeInput" placeholder="Ingreso USD" value="${income}" style="flex:2;">
              <input type="number" id="rateInput" placeholder="Tasa Bs/USD" value="${rate}" style="flex:1;">
              <button id="updateFinance"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="estadisticas-finanza">
              <div class="estadistica-item" data-tooltip="Necesidades: $${gastosNec} / $${maxNec}">
                <i class="fas fa-home"></i>
                <span>N: $${(maxNec - gastosNec).toFixed(0)}</span>
              </div>
              <div class="estadistica-item" data-tooltip="Deseos: $${gastosDes} / $${maxDes}">
                <i class="fas fa-umbrella-beach"></i>
                <span>D: $${(maxDes - gastosDes).toFixed(0)}</span>
              </div>
              <div class="estadistica-item" data-tooltip="Ahorro: $${gastosAho} / $${maxAho}">
                <i class="fas fa-piggy-bank"></i>
                <span>A: $${(maxAho - gastosAho).toFixed(0)}</span>
              </div>
            </div>

            <div class="contenedor-barra">
              <div class="segmento-barra" style="width:${pctNec}%;" data-tooltip="Necesidad: $${gastosNec}"></div>
              <div class="segmento-barra" style="width:${pctDes}%;" data-tooltip="Deseo: $${gastosDes}"></div>
              <div class="segmento-barra" style="width:${pctAho}%;" data-tooltip="Ahorro: $${gastosAho}"></div>
            </div>

            <div style="background:rgba(0,0,0,0.2); border-radius:40px; padding:1.2rem; margin:1rem 0;">
              <div style="display:flex; gap:0.5rem;">
                <input type="text" id="gastoDesc" placeholder="Descripción" style="flex:2;">
                <input type="number" id="gastoMonto" placeholder="Monto" style="flex:1;">
              </div>
              <select id="gastoCat" style="margin-bottom:0.5rem;">
                <option value="necesidad">Necesidad</option>
                <option value="deseo">Deseo</option>
                <option value="ahorro">Ahorro</option>
              </select>
              <button id="addGasto" style="width:100%;"><i class="fas fa-plus-circle"></i> Registrar gasto</button>
            </div>

            <div class="lista-gastos">
              ${listaGastos || '<div style="text-align:center; opacity:0.5;">No hay gastos registrados</div>'}
            </div>
          </div>
        `;
      }

      // --- Diario ---
      function renderDiario() {
        const entradas = diary.slice(-5).reverse().map(e => `
          <div style="border-bottom:0.5px solid rgba(255,255,255,0.05); padding:0.7rem 0;">
            <i class="fas fa-quote-right" style="color:#ffd966; margin-right:0.8rem;"></i>
            ${e.texto}
            <span class="mono" style="float:right; opacity:0.5;">${new Date(e.ts).toLocaleTimeString()}</span>
          </div>
        `).join('');

        return `
          <div class="tarjeta" id="modulo-diario">
            <h3><i class="fas fa-feather-alt"></i> Bitácora</h3>
            <textarea id="diarioText" rows="3" placeholder="Escribe tu reflexión..."></textarea>
            <button id="saveDiario" style="width:100%;"><i class="fas fa-save"></i> Conservar</button>
            <div style="max-height:200px; overflow-y:auto; margin-top:1.5rem;">
              ${entradas}
            </div>
          </div>
        `;
      }

      // --- Tareas ---
      function renderTareas() {
        const lista = tasks.map((t, i) => `
          <div class="item-tarea" draggable="true" data-index="${i}">
            <i class="fas fa-grip-vertical"></i>
            <span>${t.titulo}</span>
            <span class="etiqueta-prioridad" style="background:${t.prioridad==='alta'?'rgba(255,112,166,0.3)':t.prioridad==='media'?'rgba(112,214,255,0.3)':'rgba(255,217,102,0.3)'};">${t.prioridad}</span>
            <button class="btn-complete" data-index="${i}"><i class="fas ${t.estado === 'completada' ? 'fa-undo' : 'fa-check'}"></i></button>
            <button class="btn-delete-task" data-index="${i}"><i class="fas fa-trash"></i></button>
          </div>
        `).join('');

        return `
          <div class="tarjeta" id="modulo-tareas">
            <h3><i class="fas fa-tasks"></i> Actividades <button id="showAddTask" style="padding:0.3rem 1rem;"><i class="fas fa-plus"></i></button></h3>
            <div class="lista-tareas" id="tasksList">
              ${lista}
            </div>
            <div id="addTaskForm" class="oculto" style="margin-top:1rem;">
              <input type="text" id="taskTitle" placeholder="Título">
              <select id="taskPriority">
                <option>alta</option><option>media</option><option>baja</option>
              </select>
              <button id="createTask" style="width:100%;"><i class="fas fa-plus-circle"></i> Crear</button>
            </div>
          </div>
        `;
      }

      // --- Enlaces ---
      function renderEnlaces() {
        const lista = links.map((l, i) => `
          <span class="pill-enlace" data-index="${i}"><i class="fas fa-link"></i> ${l.nombre} <small><i class="fas fa-times"></i></small></span>
        `).join('');

        return `
          <div class="tarjeta" id="modulo-enlaces">
            <h3><i class="fas fa-bookmark"></i> Sitios rapidos <button id="showAddLink" style="padding:0.3rem 1rem;"><i class="fas fa-plus"></i></button></h3>
            <div class="contenedor-enlaces" id="linksContainer">
              ${lista}
            </div>
            <div id="addLinkForm" class="oculto" style="margin-top:1rem;">
              <input type="text" id="linkName" placeholder="Nombre">
              <input type="text" id="linkUrl" placeholder="URL">
              <button id="createLink" style="width:100%;"><i class="fas fa-save"></i> Guardar</button>
            </div>
          </div>
        `;
      }

      // ===== DELEGACIÓN DE EVENTOS =====
      bentoGrid.addEventListener('click', (e) => {
        const target = e.target.closest('button') || e.target;
        if (!target) return;

        // --- Horario ---
        if (target.id === 'addClassBtn') {
          const nombre = document.getElementById('newClassName')?.value;
          const hora = document.getElementById('newClassTime')?.value;
          if (nombre && hora) {
            classes.push({ id: Date.now() + Math.random(), nombre, hora });
            save(STORAGE_KEYS.classes, classes);
            render();
          }
        }
        if (target.classList.contains('btn-delete-class')) {
          const id = target.dataset.id;
          classes = classes.filter(c => c.id !== id);
          save(STORAGE_KEYS.classes, classes);
          render();
        }
        if (target.classList.contains('btn-snooze')) {
          const id = target.dataset.id;
          snoozed[id] = Date.now() + 5*60000;
          save(STORAGE_KEYS.snoozed, snoozed);
          render();
        }

        // --- Finanzas ---
        if (target.id === 'updateFinance') {
          finance.income = parseFloat(document.getElementById('incomeInput')?.value) || 5000;
          finance.rate = parseFloat(document.getElementById('rateInput')?.value) || 45;
          save(STORAGE_KEYS.finance, finance);
          render();
        }
        if (target.id === 'addGasto') {
          const desc = document.getElementById('gastoDesc')?.value;
          const monto = parseFloat(document.getElementById('gastoMonto')?.value);
          const cat = document.getElementById('gastoCat')?.value;
          if (desc && !isNaN(monto) && monto > 0) {
            transactions.push({ desc, monto, cat, fecha: Date.now() });
            save(STORAGE_KEYS.transactions, transactions);
            render();
          }
        }
        if (target.classList.contains('btn-eliminar-gasto')) {
          const idx = target.dataset.index;
          if (idx !== undefined) {
            transactions.splice(idx, 1);
            save(STORAGE_KEYS.transactions, transactions);
            render();
          }
        }

        // --- Diario ---
        if (target.id === 'saveDiario') {
          const texto = document.getElementById('diarioText')?.value;
          if (texto.trim()) {
            diary.push({ texto, ts: Date.now() });
            save(STORAGE_KEYS.diary, diary);
            render();
          }
        }

        // --- Tareas ---
        if (target.id === 'showAddTask') {
          document.getElementById('addTaskForm')?.classList.toggle('oculto');
        }
        if (target.id === 'createTask') {
          const tit = document.getElementById('taskTitle')?.value;
          const pri = document.getElementById('taskPriority')?.value;
          if (tit) {
            tasks.push({ titulo: tit, prioridad: pri, estado: 'pendiente' });
            save(STORAGE_KEYS.tasks, tasks);
            render();
          }
        }
        if (target.classList.contains('btn-complete')) {
          const idx = target.dataset.index;
          if (tasks[idx]) {
            tasks[idx].estado = tasks[idx].estado === 'completada' ? 'pendiente' : 'completada';
            save(STORAGE_KEYS.tasks, tasks);
            render();
          }
        }
        if (target.classList.contains('btn-delete-task')) {
          const idx = target.dataset.index;
          if (idx !== undefined) {
            tasks.splice(idx, 1);
            save(STORAGE_KEYS.tasks, tasks);
            render();
          }
        }

        // --- Enlaces ---
        if (target.id === 'showAddLink') {
          document.getElementById('addLinkForm')?.classList.toggle('oculto');
        }
        if (target.id === 'createLink') {
          const nom = document.getElementById('linkName')?.value;
          const url = document.getElementById('linkUrl')?.value;
          if (nom && url) {
            links.push({ nombre: nom, url });
            save(STORAGE_KEYS.links, links);
            render();
          }
        }
        if (target.classList.contains('pill-enlace')) {
          const idx = target.dataset.index;
          if (target.querySelector('small') && e.target.closest('small')) {
            links.splice(idx, 1);
            save(STORAGE_KEYS.links, links);
            render();
          } else {
            const url = links[idx]?.url;
            if (url) window.open(url, '_blank');
          }
        }
      });

      // Auto-guardado diario
      bentoGrid.addEventListener('input', (e) => {
        if (e.target.id === 'diarioText') {
          clearTimeout(window.diaryTimer);
          window.diaryTimer = setTimeout(() => {
            const texto = e.target.value;
            if (texto.trim()) {
              diary.push({ texto, ts: Date.now() });
              save(STORAGE_KEYS.diary, diary);
              render();
            }
          }, 1500);
        }
      });

      // Drag & drop tareas
      bentoGrid.addEventListener('dragstart', (e) => {
        if (e.target.classList.contains('item-tarea')) {
          e.dataTransfer.setData('text/plain', e.target.dataset.index);
        }
      });
      bentoGrid.addEventListener('dragover', (e) => e.preventDefault());
      bentoGrid.addEventListener('drop', (e) => {
        e.preventDefault();
        const from = e.dataTransfer.getData('text/plain');
        const to = e.target.closest('.item-tarea')?.dataset.index;
        if (from !== undefined && to !== undefined && from !== to) {
          const newTasks = [...tasks];
          const [removed] = newTasks.splice(from, 1);
          newTasks.splice(to, 0, removed);
          tasks = newTasks;
          save(STORAGE_KEYS.tasks, tasks);
          render();
        }
      });

      render();
    })();
  </script>
</body>
</html>
